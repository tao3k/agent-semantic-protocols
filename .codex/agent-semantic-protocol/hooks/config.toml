# Semantic agent client hook config.
# Loaded by `asp hook` on every client hook invocation.
# Missing or comment-only rules preserve the built-in classifier behavior.
schemaId = "agent.semantic-protocols.hook.client-config"
schemaVersion = "1"
protocolId = "agent.semantic-protocols.hook"
protocolVersion = "1"

# AST patch routing is experimental and disabled for generated Codex hook configs.
[experimental.semanticAstPatch]
enabled = false

[[rules]]
id = "deny-shell-source-argv"
enabled = true
event = "pre-tool"
priority = 80
decision = "deny"
reasonKind = "bulk-source-dump"
message = "Use the language harness instead of shell argv source reads."

[rules.match]
tool = "Bash"
commandAny = ["sed", "perl", "rg", "wl"]
argvSourceGlobAny = [
  "*.rs", "**/*.rs",
  "*.py", "**/*.py",
  "*.ts", "**/*.ts",
  "*.tsx", "**/*.tsx",
  "*.js", "**/*.js",
  "*.jsx", "**/*.jsx",
  "*.mts", "**/*.mts",
  "*.cts", "**/*.cts",
  "*.mjs", "**/*.mjs",
  "*.cjs", "**/*.cjs",
  "*.ss", "**/*.ss",
  "*.scm", "**/*.scm",
  "*.sld", "**/*.sld",
  "*.jl", "**/*.jl",
]
argvSourceExcludeFlagAny = ["--output", "--output-file", "--out", "-o"]

