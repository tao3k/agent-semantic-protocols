[features]

hooks = true
unified_exec = true

plugins = true
[marketplaces.asp-project]
source_type = "local"
source = "."
[plugins."asp-codex-plugin@asp-project"]
enabled = true

# BEGIN agent-semantic-protocol agent hooks
# Generated by `asp install plugin --codex`.
# ASP Explorer role registration for Codex spawn_agent.

[agents.asp_explorer]
description = "ASP search/query evidence explorer."
config_file = "agents/asp-explorer.toml"
nickname_candidates = ["ASP Explore", "ASP Reasoning", "ASP Search"]

# Root dispatcher for activated semantic hook providers.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook activation"
command = '''
repo_root='/Users/guangtao/ghq/github.com/tao3k/agent-semantic-protocols'
cd "$repo_root"
activation='/Users/guangtao/.agent-semantic-protocols/hooks/projects/repo-ffcb9db06b424c3e/workspaces/workspace-d16a7161b7be05fc/state/activation.json'
exec direnv exec "$repo_root" "$repo_root/.bin/asp" hook session-start --client codex --activation "$activation"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
timeout = 5
statusMessage = "Planning semantic search flow"
command = '''
repo_root='/Users/guangtao/ghq/github.com/tao3k/agent-semantic-protocols'
cd "$repo_root"
activation='/Users/guangtao/.agent-semantic-protocols/hooks/projects/repo-ffcb9db06b424c3e/workspaces/workspace-d16a7161b7be05fc/state/activation.json'
exec direnv exec "$repo_root" "$repo_root/.bin/asp" hook user-prompt --client codex --activation "$activation"
'''

