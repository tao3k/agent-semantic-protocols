[features]
hooks = true
unified_exec = true

# BEGIN semantic-agent-hook agent hooks
# Generated by `semantic-agent-hook install --client codex`.
# Root dispatcher for activated semantic hook providers.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook activation"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex session-start --activation "$activation"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
timeout = 5
statusMessage = "Planning semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex user-prompt --activation "$activation"
'''

[[hooks.PreToolUse]]
matcher = "Read|read_file|mcp__.*__read_file|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PreToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex pre-tool --activation "$activation"
'''

[[hooks.PermissionRequest]]
matcher = "Read|read_file|mcp__.*__read_file|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PermissionRequest.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic approval flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex permission-request --activation "$activation"
'''

[[hooks.PostToolUse]]
matcher = "Read|read_file|mcp__.*__read_file|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PostToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Updating semantic search flow state"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex post-tool --activation "$activation"
'''

[[hooks.SubagentStart]]
matcher = "Read|read_file|mcp__.*__read_file|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.SubagentStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Preparing semantic subagent context"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex subagent-start --activation "$activation"
'''

[[hooks.SubagentStop]]
matcher = "Read|read_file|mcp__.*__read_file|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.SubagentStop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic subagent evidence"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex subagent-stop --activation "$activation"
'''

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic changed files"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.codex/semantic-agent-hook/activation.json"
exec semantic-agent-hook hook --client codex stop --activation "$activation"
'''
# END semantic-agent-hook agent hooks
