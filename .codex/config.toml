[features]
hooks = true
unified_exec = true

# BEGIN semantic-agent-hook agent hooks
# Generated by `semantic-agent-hook install --client codex`.
# Root dispatcher for language-owned semantic hook profiles.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook profiles"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex session-start --profiles "$profiles"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
timeout = 5
statusMessage = "Planning semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex user-prompt --profiles "$profiles"
'''

[[hooks.PreToolUse]]
matcher = ".*"

[[hooks.PreToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex pre-tool --profiles "$profiles"
'''

[[hooks.PermissionRequest]]
matcher = ".*"

[[hooks.PermissionRequest.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic approval flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex permission-request --profiles "$profiles"
'''

[[hooks.PostToolUse]]
matcher = ".*"

[[hooks.PostToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Updating semantic search flow state"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex post-tool --profiles "$profiles"
'''

[[hooks.SubagentStart]]
matcher = ".*"

[[hooks.SubagentStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Preparing semantic subagent context"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex subagent-start --profiles "$profiles"
'''

[[hooks.SubagentStop]]
matcher = ".*"

[[hooks.SubagentStop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic subagent evidence"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex subagent-stop --profiles "$profiles"
'''

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic changed files"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
exec semantic-agent-hook hook --client codex stop --profiles "$profiles"
'''
# END semantic-agent-hook agent hooks
