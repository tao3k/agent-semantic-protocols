[features]
hooks = true
unified_exec = true

# BEGIN agent-semantic-protocol agent hooks
# Generated by `asp hook install --client codex`.
# Root dispatcher for activated semantic hook providers.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook activation"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook session-start --client codex --activation "$activation" --config "$config"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
timeout = 5
statusMessage = "Planning semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook user-prompt --client codex --activation "$activation" --config "$config"
'''

[[hooks.PreToolUse]]
matcher = "Read|read|read_file|functions\\.read|functions\\.read_file|mcp__.*__read|mcp__.*__read_file|apply_patch|applypatch|functions\\.apply_patch|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PreToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook pre-tool --client codex --activation "$activation" --config "$config"
'''

[[hooks.PermissionRequest]]
matcher = "Read|read|read_file|functions\\.read|functions\\.read_file|mcp__.*__read|mcp__.*__read_file|apply_patch|applypatch|functions\\.apply_patch|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PermissionRequest.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic approval flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook permission-request --client codex --activation "$activation" --config "$config"
'''

[[hooks.PostToolUse]]
matcher = "Read|read|read_file|functions\\.read|functions\\.read_file|mcp__.*__read|mcp__.*__read_file|apply_patch|applypatch|functions\\.apply_patch|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.PostToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Updating semantic search flow state"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook post-tool --client codex --activation "$activation" --config "$config"
'''

[[hooks.SubagentStart]]
matcher = "Read|read|read_file|functions\\.read|functions\\.read_file|mcp__.*__read|mcp__.*__read_file|apply_patch|applypatch|functions\\.apply_patch|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.SubagentStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Preparing semantic subagent context"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook subagent-start --client codex --activation "$activation" --config "$config"
'''

[[hooks.SubagentStop]]
matcher = "Read|read|read_file|functions\\.read|functions\\.read_file|mcp__.*__read|mcp__.*__read_file|apply_patch|applypatch|functions\\.apply_patch|functions.exec_command|multi_tool_use.parallel|Bash|Shell"

[[hooks.SubagentStop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic subagent evidence"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook subagent-stop --client codex --activation "$activation" --config "$config"
'''

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic changed files"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
activation="$repo_root/.cache/agent-semantic-protocol/hooks/activation.json"
config="$repo_root/.codex/agent-semantic-protocol/hooks/config.toml"
exec asp hook stop --client codex --activation "$activation" --config "$config"
'''
# END agent-semantic-protocol agent hooks
