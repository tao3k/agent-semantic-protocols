name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  asp-rust:
    name: ASP Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enable Windows Git long paths
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: git config --global core.longpaths true

      - name: Checkout provider catalog submodules
        shell: bash
        run: |
          git submodule update --init --depth 1 \
            languages/rust-lang-project-harness \
            languages/gerbil-scheme-language-project-harness \
            languages/org \
            languages/orgize \
            languages/typescript-lang-project-harness \
            languages/python-lang-project-harness \
            languages/JuliaLangProjectHarness.jl

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install uv
        if: ${{ matrix.os != 'windows-latest' }}
        uses: astral-sh/setup-uv@v5
        with:
          # Avoid setup-uv post-job cache pruning failures after asp smoke tests.
          enable-cache: false

      - name: Set up Python
        if: ${{ matrix.os != 'windows-latest' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install asp-graph-turbo
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          tool_bin="$RUNNER_TEMP/asp-tools/bin"
          tool_dir="$RUNNER_TEMP/asp-tools/tools"
          mkdir -p "$tool_bin" "$tool_dir"
          UV_TOOL_BIN_DIR="$tool_bin" UV_TOOL_DIR="$tool_dir" \
            uv tool install packages/python/asp_graph_turbo
          echo "$tool_bin" >> "$GITHUB_PATH"
          "$tool_bin/asp-graph-turbo" --help

      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Configure sccache backend
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          fi
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ env.SCCACHE_GHA_ENABLED != 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: asp-rust-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.run_id }}
          restore-keys: |
            asp-rust-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}-
            asp-rust-sccache-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}-
            asp-rust-sccache-${{ runner.os }}-

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: asp-rust-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch cargo dependencies
        run: cargo fetch

      - name: Prepare provider binaries for Rust tests
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          repo_root="$PWD"
          mkdir -p .bin
          cargo build --bin asp
          install -m 755 target/debug/asp .bin/asp
          cargo build --manifest-path languages/rust-lang-project-harness/Cargo.toml --features cli --bin rs-harness
          install -m 755 languages/rust-lang-project-harness/target/debug/rs-harness .bin/rs-harness
          npm --prefix languages/typescript-lang-project-harness ci
          npm --prefix languages/typescript-lang-project-harness run build
          cat > .bin/py-harness <<EOF
          #!/usr/bin/env bash
          exec uv run --project "$repo_root/languages/python-lang-project-harness" --frozen py-harness "\$@"
          EOF
          cat > .bin/ts-harness <<EOF
          #!/usr/bin/env bash
          exec node "$repo_root/languages/typescript-lang-project-harness/dist/src/cli/main.js" "\$@"
          EOF
          cat > .bin/asp-julia-harness <<'EOF'
          #!/usr/bin/env bash
          echo "asp-julia-harness is validated outside the Rust unit-test job" >&2
          exit 127
          EOF
          cat > .bin/gslph <<'EOF'
          #!/usr/bin/env bash
          echo "gslph is validated by the Gerbil language CI job" >&2
          exit 127
          EOF
          chmod 755 .bin/py-harness .bin/ts-harness .bin/asp-julia-harness .bin/gslph
          echo "$PWD/.bin" >> "$GITHUB_PATH"

      - name: Check formatting
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo fmt --all -- --check

      - name: Run tests
        if: ${{ matrix.os != 'windows-latest' }}
        run: cargo test --workspace --all-targets --all-features

      - name: Run clippy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build asp binary
        run: cargo build --bin asp

      - name: Run asp binary smoke
        run: cargo run --quiet --bin asp -- guide

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: asp-rust-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.run_id }}

      - name: sccache summary
        if: ${{ always() }}
        shell: bash
        run: sccache --show-stats || true

  schema-and-provider-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout provider submodules
        run: |
          git submodule update --init --depth 1 \
            languages/rust-lang-project-harness \
            languages/gerbil-scheme-language-project-harness \
            languages/org \
            languages/orgize \
            languages/typescript-lang-project-harness \
            languages/python-lang-project-harness \
            languages/JuliaLangProjectHarness.jl

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: languages/typescript-lang-project-harness/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            languages/rust-lang-project-harness -> languages/rust-lang-project-harness/target
          shared-key: asp-rust-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch Rust dependencies
        run: |
          cargo fetch
          cargo fetch --manifest-path languages/rust-lang-project-harness/Cargo.toml

      - name: Root schema gates
        run: |
          uv run --project packages/python --frozen pytest \
            tests/unit/test_semantic_common_schema_copy_sync.py \
            tests/unit/test_semantic_source_location_schema.py \
            tests/unit/test_semantic_tree_sitter_grammar_profile_schema.py \
            tests/unit/test_semantic_tree_sitter_provenance_schema.py \
            tests/unit/test_semantic_tree_sitter_query_schema.py \
            tests/unit/semantic_tree_sitter_query_rfc \
            tests/unit/test_cli_first_harness_ux_rfc.py \
            tests/unit/test_agent_hook_interception_protocol_rfc.py \
            tests/unit/test_docs_rfc_skill_contracts.py \
            tests/unit/test_ci_workflow_contracts.py \
            tests/unit/semantic_query_packet_schema/test_basic.py \
            tests/unit/test_semantic_search_packet_schema.py \
            tests/unit/test_semantic_read_packet_schema.py \
            tests/unit/semantic_native_syntax_fact_index_schema \
            tests/unit/semantic_language_registry_schema \
            -q

      - name: Python provider schema gates
        run: |
          uv run --frozen --with pytest pytest \
            tests/unit/harness/test_semantic_cli_direct_read.py \
            tests/unit/harness/test_semantic_schema_registry.py \
            -q
        working-directory: languages/python-lang-project-harness

      - name: Python provider policy gate
        run: uv run --project languages/python-lang-project-harness --frozen py-harness check --full .

      - name: Build asp binary
        run: cargo build --bin asp

      - name: Rust provider graph-render smoke gates
        run: |
          SEMANTIC_AGENT_PROTOCOL_BIN="$PWD/target/debug/asp" \
            cargo test --manifest-path languages/rust-lang-project-harness/Cargo.toml \
              --workspace --all-targets --all-features --quiet \
              cli_search_graph_profiles_filter_to_rendered_aliases
          SEMANTIC_AGENT_PROTOCOL_BIN="$PWD/target/debug/asp" \
            cargo test --manifest-path languages/rust-lang-project-harness/Cargo.toml \
              --workspace --all-targets --all-features --quiet \
              cli_search_policy_renders_semantic_handles

      - name: Rust provider schema gates
        run: cargo test --manifest-path languages/rust-lang-project-harness/Cargo.toml schema --features cli --quiet

      - name: TypeScript provider schema gates
        run: |
          npm ci
          npm run build
          node --test \
            dist/tests/unit/semantic_search_schema.test.js \
            dist/tests/unit/semantic_language_registry_read_packet.test.js
        working-directory: languages/typescript-lang-project-harness

      - name: Language evidence and facade smoke gate
        shell: bash
        run: |
          set -euo pipefail
          npm install --global @openai/codex@0.144.1
          codex --version
          mkdir -p "$HOME/.local/bin"
          install -m 755 target/debug/asp "$HOME/.local/bin/asp"
          export PATH="$HOME/.local/bin:$PATH"
          cargo build --manifest-path languages/rust-lang-project-harness/Cargo.toml --features cli --bin rs-harness
          install -m 755 languages/rust-lang-project-harness/target/debug/rs-harness "$HOME/.local/bin/rs-harness"
          printf '#!/usr/bin/env bash\nexec node "%s/languages/typescript-lang-project-harness/dist/src/cli/main.js" "$@"\n' "$PWD" > "$HOME/.local/bin/ts-harness"
          chmod 755 "$HOME/.local/bin/ts-harness"
          printf '#!/usr/bin/env bash\nexec uv run --project "%s/languages/python-lang-project-harness" --frozen py-harness "$@"\n' "$PWD" > "$HOME/.local/bin/py-harness"
          chmod 755 "$HOME/.local/bin/py-harness"
          cp .agents/asp.toml .agents/asp.toml.ci-full-provider
          restore_asp_toml() {
            mv .agents/asp.toml.ci-full-provider .agents/asp.toml
          }
          trap restore_asp_toml EXIT
          cat > .agents/asp.toml <<'EOF'
          [providers.gerbil-scheme]
          enabled = false

          [providers.julia]
          enabled = false
          EOF
          asp install plugin --codex .
          ASP_LANGUAGE_EVIDENCE_SMOKE_SCOPE=core-fast \
            ASP_LANGUAGE_EVIDENCE_LANGUAGES=rust,python,typescript \
            ASP_LANGUAGE_EVIDENCE_TIMING_JSON=.cache/agent-semantic-protocol/language-evidence-smoke-core-fast.json \
            uv run --project packages/python/asp_graph_turbo --frozen pytest tests/unit/test_language_evidence_smoke.py -q
          cat .cache/agent-semantic-protocol/language-evidence-smoke-core-fast.json

      - name: Tree-sitter query contract gates
        run: uv run --project packages/python --frozen python -m tools tree-sitter validate contracts
