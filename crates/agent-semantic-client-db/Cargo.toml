[package]
name = "agent-semantic-client-db"
version = "0.1.0"
edition = "2024"
description = "SQLite-backed local database for the agent semantic client cache."
license = "MIT"

[dependencies]
agent-semantic-client-core = { path = "../agent-semantic-client-core" }
rusqlite = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[[bench]]
name = "sqlite_cache_hot_path"
harness = false

[build-dependencies]
rust-lang-project-harness = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
rust-lang-project-harness = { workspace = true }
