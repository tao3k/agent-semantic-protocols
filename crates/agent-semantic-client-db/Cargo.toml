[package]
name = "agent-semantic-client-db"
version = "0.1.0"
edition = "2024"
description = "Turso-backed DB Engine for the agent semantic client cache."
license = "MIT"

[dependencies]
agent-semantic-client-core = { path = "../agent-semantic-client-core" }
rusqlite = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
turso = { workspace = true, optional = true }

[features]
default = ["turso-backend"]
turso-backend = ["dep:turso"]

[[bench]]
name = "sqlite_cache_hot_path"
harness = false

[build-dependencies]
rust-lang-project-harness = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
rust-lang-project-harness = { workspace = true }
tokio = { workspace = true }
