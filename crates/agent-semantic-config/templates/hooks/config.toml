testingWithoutChild = """
ASP denied main-session test/build command.
Run the resident-child choice pane and choose one number. Keep re-entering the same loop until state=Ready.
   asp agent session bootstrap --name {{residentChildName}}
The pane owns creation, validation, model alignment, registration, and cleanup for the testing child.
Main agent should keep judgment, edits, and checkpoints; run large tests/builds in the testing child.
Command: {{command}}
"""
binaryGateWithChild = """
ASP query/search command denied in main agent session.
Route this command to resident {{residentChildName}} child session `{{childSessionId}}`; do not spawn another {{residentChildName}} session.
rootSessionId={{rootSessionId}}
childSessionId={{childSessionId}}
loopCommand=asp agent session bootstrap --name {{residentChildName}}
command={{command}}
"""
binaryGateWithoutChild = """
ASP query/search command denied in agent session because no active {{residentChildName}} child session is registered for this root session.
Run the resident-child choice pane and choose one number. Keep re-entering the same loop until state=Ready.
   asp agent session bootstrap --name {{residentChildName}}
Do not run low-level session commands or create generic subagents outside the pane.
After state=Ready, send the blocked ASP command to the registered message-agent target and wait for its compact receipt.
rootSessionId={{rootSessionId}}
loopCommand=asp agent session bootstrap --name {{residentChildName}}
command={{command}}
"""
binaryGateInvalidChild = """
ASP query/search command denied in agent session because the registered {{residentChildName}} child session is not routable.
blockedState=validation-warning-or-non-routable-child
rootSessionId={{rootSessionId}}
childSessionId={{childSessionId}}
childStatus={{childStatus}}
Run the resident-child choice pane and choose one number. Keep re-entering the same loop until state=Ready.
   asp agent session bootstrap --name {{residentChildName}}
The pane owns status inspection, model alignment, message target recovery, cleanup, creation, and registration. Do not run low-level session commands as independent fallback workflows.
After state=Ready, send the blocked ASP command to the registered message-agent target and wait for its compact receipt.
command={{command}}
"""
binaryGateRegistryBlocked = """
ASP query/search command denied in agent session because the ASP session registry is currently unavailable.
blockedState=registry-locked
rootSessionId={{rootSessionId}}
Run the resident-child choice pane again after the registry lock clears.
   asp agent session bootstrap --name {{residentChildName}}
Do not fall back to raw source tools while the registry is locked.
registryError={{registryError}}
command={{command}}
"""
sourceAccessCompact = """
ASP denied source access (`{{reason}}`).
Use the resident-child interactive loop. Choose one number, perform that native platform action, then re-enter the loop until state=Ready:
   asp agent session bootstrap --name {{residentChildName}}
After state=Ready, send the denied command to the registered message-agent target and wait for a compact `[asp-search-subagent]` receipt.
Do not use low-level session commands, generic subagents, normal thread reads, raw source reads, or rollout scans as fallback paths.
recoveryRef={{recoveryRef}}
"""
sourceAccessCompactRepeated = """
ASP denied source access again (`{{reason}}`).
Stay in the resident-child interactive loop; choose one number and re-enter the loop until state=Ready:
   asp agent session bootstrap --name {{residentChildName}}
After state=Ready, use the registered message-agent target for ASP evidence work only.
recoveryRef={{recoveryRef}}
"""
sourceAccessCompactSubagent = """
ASP denied source access (`{{reason}}`) inside {{residentChildName}}.
Use ASP query/search routes and return one compact `[asp-search-subagent]` graph-route receipt with schema/intent/route/state/evidence/next.
Do not return source bodies, snippets, line-range selectors, raw thread reads, or rollout log scans.
recoveryRef={{recoveryRef}}
"""
