binaryGateInvalidChild = """
ASP query/search command denied in agent session because the registered {{residentChildName}} child session is not routable.
blockedState=validation-warning-or-non-routable-child
rootSessionId={{rootSessionId}}
childSessionId={{childSessionId}}
childStatus={{childStatus}}
nextAction=inspect-existing-child-cleanup-or-replace-validation-action
agentInstruction=First run the status command below. If status returns validationStatus=warning and validationReason reports a model mismatch, the parent agent may send an agent message to that same managed child only when agentMessageTargetId is available, receive a subagent message receipt, then rerun status. If status returns messageTargetStatus=missing, validationStatus=failed, or childStatus is archived/closed/expired/invalid/missing/orphan-risk, do not use the existing {{residentChildName}} child; use the Codex native close-agent action for an invalid subagent when visible, archive only temporary Normal test threads, start the configured ASP managed subagent, and register the returned child id. If only childSessionId/threadId is available and native message-agent send does not accept it, report bootstrapBlocked=host-message-agent-target-unavailable; do not use normal/read thread.
configSwitchCommandTemplate=asp agent session switch-model --name {{residentChildName}} --model <requiredModel-from-validationReason> --json
configSwitchPurpose=Use the config switch command only when the underlying ASP/Codex model mapping or capacity fallback configuration must be updated.
0. Shell action: inspect status.
   asp agent session status --name {{residentChildName}} --json
1. If validationStatus=warning and validationReason includes requiredAction=parent-send-message-same-child-with-required-model, the parent agent sends an agent message to the existing managed child with model override <requiredModel-from-validationReason> only when agentMessageTargetId is available, waits for a subagent message receipt, and does not create a new child. If no agentMessageTargetId is available, report bootstrapBlocked=host-message-agent-target-unavailable.
2. If validationStatus=failed, messageTargetStatus=missing, or childStatus is archived/closed/expired/invalid/missing/orphan-risk, use the Codex native close-agent action for an invalid subagent when visible; archive only temporary Normal test threads; then {{createAction}}.
3. If a replacement child was required, register the returned child session id.
   asp agent session register --name {{residentChildName}} --child-session-id <child-session-id> --roles subagent,search
4. Retry the blocked ASP command.
command={{command}}
"""
