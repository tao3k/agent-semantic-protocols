[workspace]
members = [
    "crates/agent-semantic-client",
    "crates/agent-semantic-client-core",
    "crates/agent-semantic-client-db",
    "crates/agent-semantic-client-local-cli",
    "crates/agent-semantic-hook",
    "crates/agent-semantic-protocol",
]
exclude = ["languages/rust-lang-project-harness"]
resolver = "2"

[workspace.dependencies]
fs2 = "0.4"
globset = "0.4"
rust-lang-project-harness = { path = "languages/rust-lang-project-harness", default-features = false }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
toml = "0.9"
tree-sitter = "0.26"
tree-sitter-bash = "0.25"

[profile.release]
opt-level = 3
lto = "thin"
strip = true
panic = "abort"

[profile.dev]
debug = 1
split-debuginfo = "unpacked"
