[project]
name = "asp-graph-turbo"
version = "0.1.0"
description = "Typed graph frontier ranking engine for ASP client packets."
requires-python = ">=3.11"
dependencies = [
    "scipy>=1.14",
    "asp-memory-engine",
]

[project.scripts]
asp-graph-turbo = "asp_graph_turbo.graph_turbo_cli:main"

[dependency-groups]
dev = [
  "pytest>=9,<10",
]

[tool.uv.sources]
asp-memory-engine = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_graph_turbo"]
