[project]
name = "asp-memory-engine"
version = "0.1.0"
description = "Deterministic Python memory engine adapted for ASP workspace recall."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
asp-memory-engine = "asp_memory_engine.cli:main"

[dependency-groups]
dev = [
    "pytest>=9,<10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_memory_engine"]
