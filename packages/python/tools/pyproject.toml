[project]
name = "agent-semantic-protocols-tools"
version = "0.1.0"
description = "Python tooling for Agent Semantic Protocols."
requires-python = ">=3.11"
dependencies = [
    "asp-graph-turbo",
    "axiom-axle>=1.4.0",
    "claude-code-sdk>=0.0.25",
    "jsonschema>=4.23,<5",
    "tiktoken>=0.9,<1",
]

[dependency-groups]
dev = [
    "pytest>=9,<10",
]

[tool.uv.sources]
asp-graph-turbo = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tools"]

[tool.hatch.build.targets.wheel.force-include]
"src/tools/proofs" = "tools/proofs"
