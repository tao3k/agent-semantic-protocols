[project]
name = "agent-semantic-protocols-python-workspace"
version = "0.1.0"
description = "Python workspace for Agent Semantic Protocols packages."
requires-python = ">=3.12"
dependencies = [
    "agent-semantic-protocols-tools",
    "asp-graph-turbo",
    "asp-memory-engine",
]

[dependency-groups]
dev = [
    "python-lang-project-harness",
    "pytest>=9,<10",
]

[tool.uv]
package = false

[tool.uv.sources]
agent-semantic-protocols-tools = { workspace = true }
asp-graph-turbo = { workspace = true }
python-lang-project-harness = { path = "../../languages/python-lang-project-harness", editable = true }
asp-memory-engine = { workspace = true }

[tool.uv.workspace]
members = [
    "asp_graph_turbo",
    "tools",
    "asp_memory_engine",
]
