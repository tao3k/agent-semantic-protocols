[project]
name = "agent-semantic-protocols-python-workspace"
version = "0.1.0"
description = "Python workspace for Agent Semantic Protocols packages."
requires-python = ">=3.11"
dependencies = [
    "agent-semantic-protocols-tools",
    "asp-graph-turbo",
]

[dependency-groups]
dev = [
    "pytest>=9,<10",
]

[tool.uv]
package = false

[tool.uv.sources]
agent-semantic-protocols-tools = { workspace = true }
asp-graph-turbo = { workspace = true }

[tool.uv.workspace]
members = [
    "asp_graph_turbo",
    "tools",
]
