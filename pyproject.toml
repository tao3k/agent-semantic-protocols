[dependency-groups]
dev = [
  "jsonschema>=4.23,<5",
  "pytest>=9,<10",
  "tiktoken>=0.9,<1",
]

[tool.uv]
package = false

[tool.uv.workspace]
exclude = ["packages/python"]
members = ["packages/python"]

[tool.python-lang-project-harness]
ignored_dir_names = [
  ".git",
  ".cache",
  ".data",
  ".devenv",
  ".direnv",
  ".hg",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".run",
  ".tox",
  ".venv",
  "__pycache__",
  "build",
  "dist",
  "expected-output",
  "node_modules",
  "real-output",
  "result",
  "target",
  "venv",
]

[tool.pytest.ini_options]
pythonpath = ["packages/python/src"]
