[dependency-groups]
dev = [
  "jsonschema>=4.23,<5",
  "python-lang-project-harness",
  "pytest>=9,<10",
  "tiktoken>=0.9,<1",
]

[tool.uv]
package = false

[tool.uv.sources]
python-lang-project-harness = { path = "languages/python-lang-project-harness", editable = true }

[tool.uv.workspace]
exclude = ["packages/python"]
members = ["packages/python"]

[tool.python-lang-project-harness]
ignored_dir_names = [
  ".git",
  ".cache",
  ".data",
  ".devenv",
  ".direnv",
  ".hg",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".run",
  ".tox",
  ".venv",
  "__pycache__",
  "build",
  "dist",
  "expected-output",
  "node_modules",
  "real-output",
  "result",
  "target",
  "venv",
]

[tool.python-lang-project-harness.verification.responsibility_task_kinds]
public_api = ["regression"]
performance = ["performance"]
cli = ["regression"]
persistence = ["regression"]
network = ["stress"]

[[tool.python-lang-project-harness.verification.profile_hints]]
owner_path = "languages/python-lang-project-harness/src/python_lang_parser/__init__.py"
responsibilities = ["public_api"]
rationale = "parser facade exports are a shared provider API boundary"

[[tool.python-lang-project-harness.verification.profile_hints]]
owner_path = "languages/python-lang-project-harness/src/python_lang_project_harness/__init__.py"
responsibilities = ["public_api"]
rationale = "harness facade exports pytest, policy, search, and verification APIs"

[[tool.python-lang-project-harness.verification.profile_hints]]
owner_path = "packages/python/asp_graph_turbo/src/asp_graph_turbo/__init__.py"
responsibilities = ["public_api"]
rationale = "graph turbo facade is consumed by ASP ranking and cache evidence tools"

[[tool.python-lang-project-harness.verification.profile_hints]]
owner_path = "packages/python/tools/src/tools/julia_cache_performance.py"
responsibilities = ["public_api", "performance"]
rationale = "cache performance CLI is benchmark-facing evidence"

[tool.pytest.ini_options]
addopts = [
  "--python-project-harness",
]
pythonpath = ["packages/python/src", "tests"]
